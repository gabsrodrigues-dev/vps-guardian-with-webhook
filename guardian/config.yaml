detection:
  suspicious_terms:
    - xmrig
    - monero
    - moonre
    - miner
    - hashvault
    - pool.support
    - stratum
    - nicehash
    - cryptonight
    - minerd
    - cpuminer
    - ethminer
    - claymore
    - phoenixminer
    - t-rex
    - gminer
    - lolminer
    - nbminer
    - hiveos
  scan_interval_seconds: 5

# Monitoramento de Recursos - LÓGICA SIMPLIFICADA
# Premissa: Nenhum processo legítimo consome >75% por mais de 10 minutos
resources:
  cpu_threshold_percent: 75
  memory_threshold_percent: 75
  notify_after_minutes: 10         # Notificar via Telegram após 10 minutos
  kill_after_minutes: 20           # MATAR após 20 minutos (sem exceção)
  vps_abuse_limit_minutes: 90      # Limite da VPS antes de bloqueio por abuso

  # Whitelist mínima - APENAS processos essenciais do sistema
  whitelist:
    - dockerd
    - containerd
    - systemd
    - sshd
    - guardian.py

network:
  mining_pools_list: /opt/vps-guardian/firewall/blocklists/mining-pools.txt
  tor_nodes_list: /opt/vps-guardian/firewall/blocklists/tor-exit-nodes.txt
  suspicious_ports:
    - 3333
    - 4444
    - 5555
    - 7777
    - 8888
    - 9999
    - 14433
    - 14444
    - 45700

response:
  quarantine_dir: /var/quarantine
  log_file: /var/log/guardian.log
  telegram:
    enabled: false
    webhook_url: null
    chat_id: null
  webhook:
    enabled: false
    url: null
    auth_token: null
    timeout_seconds: 10
    retry_count: 2

integrity:
  critical_binaries:
    - /usr/bin/ps
    - /usr/bin/top
    - /bin/ls
    - /usr/bin/lsof
    - /usr/bin/netstat
    - /usr/bin/ss
    - /usr/bin/crontab
    - /usr/bin/ldd
  hash_db: /var/lib/guardian/hashes.json
  rootkit_detection:
    enabled: true
    check_ld_preload: true
    check_hidden_uid0: true
    check_hugepages: true
    check_hidden_processes: true
    check_kernel_modules: true

filesystem:
  watch_dirs:
    - /tmp
    - /dev/shm
    - /var/tmp
  max_file_age_minutes: 5

# Forensics configuration
forensics:
  enabled: true
  storage_dir: /var/lib/guardian/forensics
  max_collection_time_seconds: 2
  include_environ: true
  include_open_files: true
  retention_days: 30

# Persistence detection
persistence:
  enabled: true
  scan_interval_seconds: 60
  crontab:
    enabled: true
    check_system: true
    check_users: true
  systemd:
    enabled: true
    malicious_service_names:
      - bot.service
      - rondo.service
      - rsyslo.service
      - system-cleanup.service
      - perfctl.service
      - kdevtmpfsi.service
      - kinsing.service
  ssh_keys:
    enabled: true
    known_keys_db: /var/lib/guardian/known_ssh_keys.json
    alert_on_new: true

# Container awareness
containers:
  enabled: true
  on_threat: stop
  whitelist: []

  # Container resource monitoring
  resource_monitoring:
    enabled: true
    cpu_threshold_percent: 100
    kill_after_minutes: 15
    check_interval_seconds: 60
    action: stop  # stop or kill

    # Container name/image patterns to ignore (regex)
    whitelist:
      - "coolify.*"
      - "traefik.*"
      - ".*postgres.*"
      - ".*redis.*"
      - ".*mysql.*"
      - ".*mariadb.*"

    # Label-based whitelist
    whitelist_labels:
      - "coolify.managed=true"
      - "guardian.ignore=true"

# Auditd integration
auditd:
  enabled: false
  install_rules: true
  log_path: /var/log/audit/audit.log
